<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Foxcat AI Boot</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", monospace;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: radial-gradient(circle at center,#7a0000,#2a0000,#000000);
color:white;
overflow:hidden;

}

/* partículas */

.particle{
position:absolute;
width:3px;
height:3px;
background:rgba(255,0,0,0.3);
border-radius:50%;
animation:float 10s linear infinite;
}

@keyframes float{

from{
transform:translateY(100vh);
opacity:0;
}

20%{opacity:1}

to{
transform:translateY(-10vh);
opacity:0;
}

}

/* contenedor */

.container{

width:520px;
background:rgba(0,0,0,0.65);
border-radius:12px;
padding:40px;
border:1px solid rgba(255,0,0,0.25);
box-shadow:0 0 25px rgba(255,0,0,0.3);

}

/* logo */

.logo{
text-align:center;
margin-bottom:15px;
}

.logo img{
width:90px;
height:auto;
filter: drop-shadow(0 0 10px rgba(212,175,55,0.6));
}

.title{

text-align:center;
font-size:20px;
letter-spacing:2px;
margin-bottom:30px;

}

/* terminal */

.terminal{

height:150px;
background:#050505;
border-radius:8px;
padding:15px;
font-size:13px;
color:#9ef59e;
overflow:hidden;

}

.line{

opacity:0;
animation:fadeIn 0.5s forwards;

}

@keyframes fadeIn{

to{opacity:1}

}

/* barra progreso */

.progress-container{

margin-top:25px;

}

.progress-box{

height:16px;
background:#111;
border-radius:20px;
overflow:hidden;
border:1px solid rgba(255,0,0,0.3);

}

.progress{

height:100%;
width:0%;
background:linear-gradient(90deg,#d4af37,#f1d27a);
transition:width 0.2s;

}

.percent{

text-align:right;
font-size:12px;
margin-top:5px;
color:#bbb;

}

/* estado */

.status{

margin-top:10px;
font-size:13px;
color:#ccc;
text-align:center;
letter-spacing:1px;

}

</style>

</head>

<body>

<div id="particles"></div>

<div class="container">

<div class="logo">
    <img src="healtUsurper\logo.png" alt="Foxcat Logo">
</div>
<div class="title">FOXCAT MEDICAL AI</div>

<div class="terminal" id="terminal"></div>

<div class="progress-container">

<div class="progress-box">
<div class="progress" id="progress"></div>
</div>

<div class="percent" id="percent">0%</div>

</div>

<div class="status" id="status">
AI Medical System Booting...
</div>

</div>

<script>

/* partículas */

for(let i=0;i<35;i++){

let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"%";
p.style.animationDuration=(5+Math.random()*10)+"s";
document.body.appendChild(p);

}

/* mensajes de boot */

const steps=[

"Initializing Foxcat Kernel...",
"Loading Medical AI Modules...",
"Connecting Hospital Database...",
"Verifying Patient Encryption Keys...",
"Loading Clinical Prediction Engine...",
"Synchronizing Medical Records...",
"Initializing Triage Analysis AI...",
"Starting Monitoring Services...",
"Running Diagnostic Protocols...",
"System Integrity Check...",
"Preparing Medical Dashboard..."

]

const terminal=document.getElementById("terminal")

let stepIndex=0

function addLine(text){

let line=document.createElement("div")
line.className="line"
line.textContent="> "+text

terminal.appendChild(line)

terminal.scrollTop=terminal.scrollHeight

}

/* progreso */

const min=5000
const max=15000

const total=Math.random()*(max-min)+min

const interval=total/100

let progress=0

const bar=document.getElementById("progress")
const percent=document.getElementById("percent")
const status=document.getElementById("status")

const loader=setInterval(()=>{

progress++

bar.style.width=progress+"%"
percent.textContent=progress+"%"

if(progress%10===0 && stepIndex<steps.length){

addLine(steps[stepIndex])
stepIndex++

}

if(progress>=100){

clearInterval(loader)

status.textContent="System Ready"

setTimeout(()=>{

window.location.href="healtUsurper/login.html"

},800)

}

},interval)

</script>

</body>
</html>
