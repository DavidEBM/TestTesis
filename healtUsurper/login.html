<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Foxcat World S.A.S - Login</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="login-container">

    <img src="logo.png" class="logo">

    <div class="company">
        Foxcat World S.A.S
    </div>

    <form>

        <div class="input-group">
            <i class="fa fa-user"></i>
            <input type="text" placeholder="Nombre de usuario" required>
        </div>

        <div class="input-group">
            <i class="fa fa-lock"></i>
            <input type="password" placeholder="Contraseña" required>
        </div>

        <a href="#" class="forgot">¿Olvidó su contraseña?</a>

        <button type="button" class="login-btn" id="btnLogin">Iniciar sesión</button>
    </form>

    <div class="footer">
        © 2026 Foxcat World S.A.S — Todos los derechos reservados
    </div>

</div>
</body>
</html>

<script>
    document.getElementById('btnLogin').onclick = function() {
      window.location.href = "./FirstView/dashboard.html";
    };
</script>
